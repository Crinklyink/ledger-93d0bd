<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<meta name="googlebot" content="noindex, nofollow">
<title>SP — Weekly Picks</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800;900&family=Cinzel+Decorative:wght@700;900&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#07090c; --paper:#11151b; --ink:#f6f8fb; --soft:#c2cad6; --body:#e9edf3;
    --muted:#8a93a3; --blue:#9fb0c4; --red:#d24b40; --line:#e9edf3;
    --faint:rgba(233,237,243,.20); --faint2:rgba(233,237,243,.10);
    --serif:'PT Serif',Georgia,serif; --display:'Playfair Display',serif;
    --head:'Oswald',sans-serif; --mast:'Cinzel Decorative',serif;
    --up:#7fd1a3; --down:#d24b40;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg)}
  body{font-family:var(--serif);color:var(--body);-webkit-font-smoothing:antialiased}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:#20262f;border-radius:9px}
  ::-webkit-scrollbar-track{background:transparent}
  .num{font-variant-numeric:tabular-nums}
  a{color:inherit}

  .screen{min-height:100vh;width:100%;padding:44px 20px 96px}
  .paper{max-width:1060px;margin:0 auto;background:transparent;border:none;box-shadow:none;padding:8px 52px 40px}

  /* masthead */
  .topline{display:flex;align-items:center;justify-content:space-between;gap:14px;
    font-family:var(--head);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding-bottom:8px}
  .topline .mid{display:flex;align-items:center;gap:7px;color:var(--blue);white-space:nowrap}
  .rule1{border-top:1px solid var(--faint);border-bottom:1px solid var(--faint);padding:4px 0}
  .rule2{border-top:1px solid var(--faint)}
  header.mast{text-align:center;padding:48px 0 36px}
  .mast .deco{display:flex;align-items:center;justify-content:center;gap:38px;margin-bottom:0}
  .mast .deco span.line{flex:0 0 110px;height:1px}
  .mast h1{font-family:var(--mast);font-weight:900;font-size:104px;letter-spacing:.08em;color:var(--ink);line-height:1;margin:0}
  .mast .epi{font-family:var(--serif);font-style:italic;font-size:13.5px;color:var(--muted);margin-top:6px}
  .mast .epi .by{font-style:normal;font-family:var(--head);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--blue)}
  .dateline{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:16px;
    font-family:var(--head);font-size:11px;letter-spacing:.18em;text-transform:uppercase;padding:18px 0;border-bottom:1px solid var(--faint)}
  .dateline .star{color:var(--red)}

  /* tab nav */
  nav.tabs{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:0;
    border-bottom:3px double var(--line)}
  nav.tabs button{font-family:var(--head);font-size:13px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;
    background:none;border:none;color:var(--muted);cursor:pointer;padding:14px 22px;position:relative;transition:color .15s}
  nav.tabs button:hover{color:var(--body)}
  nav.tabs button.active{color:var(--ink)}
  nav.tabs button.active::after{content:"";position:absolute;left:14px;right:14px;bottom:-3px;height:3px;background:var(--red)}
  nav.tabs button .dotsep{color:var(--faint);margin:0}

  /* status strip */
  .statusbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
    padding:10px 0;border-bottom:1px solid var(--line);font-family:var(--head);font-size:10.5px;
    letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .statusbar .chips{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .statusbar b{color:var(--body);font-weight:600;margin-left:5px}
  .statusbar .live{color:var(--up)}
  .statusbar .live .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--up);margin-right:6px;
    box-shadow:0 0 0 0 rgba(127,209,163,.5);animation:pulse 2.4s ease-in-out infinite}
  .statusbar .warnchip{color:var(--red)}
  .btn{font-family:var(--head);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;
    background:none;border:1px solid var(--faint);color:var(--soft);padding:6px 14px;cursor:pointer;transition:.15s}
  .btn:hover{border-color:var(--red);color:var(--ink)}
  .btn:disabled{opacity:.5;cursor:default}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(127,209,163,.5)}50%{box-shadow:0 0 0 6px rgba(127,209,163,0)}}

  /* tab panels */
  .tab{display:none;animation:fade .35s ease}
  .tab.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  /* kicker + headline */
  .kicker{font-family:var(--head);font-size:12px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--red);
    display:flex;align-items:center;gap:12px;margin:22px 0 14px}
  .kicker .l{flex:1;height:1px;background:var(--line)}
  .kicker .r{flex:none;color:var(--body)}
  h2.lead{font-family:var(--display);font-weight:900;font-size:50px;line-height:1.03;letter-spacing:-.015em;margin:0;color:var(--ink);text-wrap:balance}
  p.sub{font-family:var(--display);font-style:italic;font-weight:400;font-size:18px;line-height:1.45;color:var(--soft);margin:14px 0 0;max-width:780px;text-wrap:pretty}
  /* relocated headline — refined, centered commentary near the foot */
  .editorial-note{margin:54px auto 0;padding-top:32px;border-top:1px solid var(--faint);max-width:720px;text-align:center}
  h2.lead2{font-family:var(--display);font-weight:900;font-size:30px;line-height:1.12;letter-spacing:-.01em;color:var(--ink);margin:0;text-wrap:balance}
  .editorial-note .sub{margin:14px auto 0;max-width:60ch;font-size:16px}
  .byline{border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:6px 0;
    font-family:var(--head);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:16px}

  /* stat line */
  .statline{display:flex;border-bottom:3px double var(--line)}
  .statline .cell{flex:1;text-align:center;padding:18px 8px;border-right:1px solid rgba(233,237,243,.28)}
  .statline .cell:last-child{border-right:none}
  .statline .cell.feat{background:rgba(210,75,64,.10)}
  .statline .v{font-family:var(--display);font-weight:900;font-size:38px;line-height:.95;font-variant-numeric:tabular-nums;color:var(--ink)}
  .statline .v.red{color:var(--red)}
  .statline .k{font-family:var(--head);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:8px}

  /* grid */
  .grid{display:grid;grid-template-columns:minmax(0,2fr) minmax(0,1fr);gap:30px;padding-top:24px}
  section.col{min-width:0}
  .sechead{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px}
  .sechead h3{font-family:var(--display);font-weight:900;font-size:28px;margin:0;letter-spacing:-.01em;color:var(--ink)}
  .sechead .meta{font-family:var(--head);font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}

  /* tables */
  table.book{width:100%;border-collapse:collapse;font-family:var(--serif);font-variant-numeric:tabular-nums}
  table.book thead tr{font-family:var(--head);font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
    border-bottom:3px double var(--line);color:var(--soft)}
  table.book th{padding:8px;text-align:right}
  table.book th.l{text-align:left}
  table.book th.c{text-align:center}
  table.book tbody tr{border-bottom:1px solid var(--faint)}
  table.book tbody tr:hover{background:rgba(233,237,243,.03)}
  table.book td{padding:11px 8px;text-align:right;font-size:14.5px}
  table.book td.l{text-align:left}
  table.book td.c{text-align:center}
  .rk{font-family:var(--display);font-weight:900;font-size:18px;color:var(--blue)}
  .rk.one{color:var(--red)}
  .tk{font-weight:700;font-size:17px;letter-spacing:.01em;color:var(--ink)}
  .co{font-family:var(--serif);font-style:italic;font-size:12px;color:var(--muted);margin-left:8px}
  .dir{font-size:14px;color:var(--up)}
  .scorebar{display:flex;align-items:center;justify-content:flex-end;gap:9px}
  .scorebar .track{flex:1;max-width:80px;height:5px;background:rgba(233,237,243,.12)}
  .scorebar .track i{display:block;height:100%;background:var(--blue)}
  .scorebar .track i.one{background:var(--red)}
  .scorebar .val{font-weight:700;font-size:14.5px;color:var(--ink);min-width:46px;text-align:right}
  .up{color:var(--up)} .pill{font-family:var(--head);font-size:10px;letter-spacing:.08em;text-transform:uppercase;
    padding:3px 8px;border:1px solid var(--faint);border-radius:2px;color:var(--soft)}
  .pill.high{color:var(--red);border-color:rgba(210,75,64,.5)} .pill.medium{color:var(--blue)} .pill.low{color:var(--muted)}

  /* rail */
  aside.rail{min-width:0;border-left:1px solid var(--line);padding-left:28px;display:flex;flex-direction:column;gap:26px}
  .rail .fhead{border-top:4px solid var(--line);padding-top:7px;font-family:var(--head);font-size:13px;font-weight:700;
    letter-spacing:.14em;text-transform:uppercase;color:var(--ink);margin-bottom:14px}
  .rail .fhead.thin{border-top:1px solid var(--line);font-size:11px;font-weight:600;color:var(--soft)}
  .sig{display:grid;grid-template-columns:108px 1fr 38px;align-items:center;gap:8px;padding:5px 0}
  .sig .f{font-family:var(--serif);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--soft)}
  .sig .bar{height:9px;background:rgba(233,237,243,.1);position:relative}
  .sig .bar i{position:absolute;top:0;left:0;height:100%;background:var(--blue)}
  .sig .n{font-family:var(--serif);font-weight:700;font-size:11.5px;text-align:right;color:var(--blue)}
  .cap{font-family:var(--serif);font-style:italic;font-size:11.5px;color:var(--muted);margin-top:8px}
  .ens{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:9px}
  .ens .k{font-family:var(--serif);font-size:12.5px;color:var(--soft)}
  .ens .v{font-family:var(--serif);font-weight:700;font-size:13px;font-variant-numeric:tabular-nums}

  /* model tab */
  .cardgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:0;border-top:1px solid var(--line);
    border-bottom:3px double var(--line);margin-top:6px}
  .cardgrid .cell{padding:16px 14px;border-right:1px solid rgba(233,237,243,.2)}
  .cardgrid .cell:last-child{border-right:none}
  .cardgrid .k{font-family:var(--head);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .cardgrid .v{font-family:var(--display);font-weight:700;font-size:22px;color:var(--ink);margin-top:6px;font-variant-numeric:tabular-nums}
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:34px;padding-top:24px}
  @media(max-width:820px){.twocol{grid-template-columns:1fr;gap:14px}}
  .editorial{font-family:var(--serif);font-size:14.5px;line-height:1.7;color:var(--soft)}
  .editorial p{margin:0 0 13px}
  .editorial b{color:var(--ink)}
  .editorial .drop::first-letter{font-family:var(--display);font-weight:900;font-size:56px;float:left;line-height:.8;padding:6px 10px 0 0;color:var(--red)}
  .warnbox{border:1px solid rgba(210,75,64,.45);background:rgba(210,75,64,.07);padding:14px 16px;margin:4px 0 16px}
  .warnbox .t{font-family:var(--head);font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--red);margin-bottom:6px}
  .warnbox .b{font-family:var(--serif);font-size:13px;line-height:1.55;color:var(--soft)}
  table.kv{width:100%;border-collapse:collapse;font-family:var(--serif);font-variant-numeric:tabular-nums}
  table.kv td{padding:9px 6px;border-bottom:1px solid var(--faint);font-size:13.5px}
  table.kv td.k{color:var(--muted)} table.kv td.v{text-align:right;font-weight:700;color:var(--body)}

  /* analytics */
  .hbar{display:grid;grid-template-columns:130px 1fr 52px;align-items:center;gap:10px;padding:7px 0}
  .hbar .l{font-family:var(--serif);font-size:13px;color:var(--soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hbar .t{height:14px;background:rgba(233,237,243,.08);position:relative}
  .hbar .t i{position:absolute;left:0;top:0;height:100%;background:var(--blue)}
  .hbar .t i.red{background:var(--red)}
  .hbar .v{font-family:var(--serif);font-weight:700;font-size:12.5px;text-align:right;color:var(--body)}

  /* footer */
  footer.colophon{margin-top:28px;text-align:center}
  footer .a{border-top:3px double var(--line);padding-top:14px;font-family:var(--serif);font-size:12.5px;line-height:1.6;color:var(--muted)}
  footer .a .sp{font-family:var(--mast);font-weight:900;font-size:16px;letter-spacing:.05em;color:var(--ink)}
  footer .b{font-family:var(--head);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--red);margin-top:8px}

  .loading{text-align:center;padding:80px 0;font-family:var(--head);letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-size:13px}

  /* password gate */
  #gate{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;background:var(--bg)}
  .gatebox{text-align:center;max-width:300px;width:100%;padding:0 24px}
  .gatebox .gt{font-family:var(--mast);font-weight:900;font-size:60px;color:var(--ink);letter-spacing:.05em;line-height:1}
  .gatebox .gs{font-family:var(--head);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin:12px 0 24px}
  .gatebox input{width:100%;background:none;border:none;border-bottom:1px solid var(--line);color:var(--ink);
    font-family:ui-monospace,Menlo,Consolas,monospace;font-size:24px;text-align:center;letter-spacing:8px;padding:10px 0;outline:none}
  .gatebox input:focus{border-color:var(--blue)}
  .gatebox button{margin-top:24px;width:100%;background:none;border:1px solid var(--line);color:var(--ink);
    font-family:var(--head);font-size:12px;letter-spacing:.14em;text-transform:uppercase;padding:12px;cursor:pointer;transition:.15s}
  .gatebox button:hover{border-color:var(--blue);color:var(--blue)}
  .gatebox .gerr{color:var(--red);font-size:12.5px;margin-top:16px;min-height:18px;font-style:italic}

  /* hero lead story */
  .hero{display:grid;grid-template-columns:minmax(0,1.25fr) minmax(0,1fr);gap:30px;align-items:center;
    border:1px solid var(--faint);border-left:3px solid var(--red);background:rgba(255,255,255,.014);padding:22px 26px;margin-top:18px}
  .hero .tag{font-family:var(--head);font-size:10.5px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--red);margin-bottom:9px}
  .hero .tkr{font-family:var(--display);font-weight:900;font-size:46px;line-height:1;color:var(--ink);letter-spacing:-.01em}
  .hero .nm{font-family:var(--serif);font-style:italic;font-size:13px;color:var(--muted);margin-top:4px}
  .hero .why{font-family:var(--serif);font-size:14px;line-height:1.6;color:var(--soft);margin-top:13px;max-width:48ch}
  .hero .why b{color:var(--ink);font-weight:700}
  .hero .nums{display:flex;flex-direction:column;gap:12px}
  .hero .ptline{display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap}
  .hero .ptline .p .lab{font-family:var(--head);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:3px}
  .hero .ptline .p .v{font-family:var(--serif);font-size:22px;color:var(--ink);font-variant-numeric:tabular-nums}
  .hero .ptline .p.tgt .v{color:var(--up)} .hero .ptline .p .v.up{color:var(--up)}
  .hero .ptline .arrow{color:var(--up);font-size:18px;padding-bottom:2px}
  .hero .minichips{display:flex;gap:26px;border-top:1px solid var(--faint);padding-top:12px}
  .hero .minichips .lab{font-family:var(--head);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .hero .minichips .v{font-family:var(--display);font-weight:700;font-size:20px;color:var(--ink);font-variant-numeric:tabular-nums;margin-top:3px}
  .spark{width:100%;height:52px;display:block}
  @media(max-width:720px){.hero{grid-template-columns:1fr;gap:16px}.hero .tkr{font-size:38px}}

  /* sortable headers */
  th.sortable{cursor:pointer;user-select:none}
  th.sortable:hover{color:var(--ink)}
  th.sortable .ind{font-size:9px;margin-left:4px;color:var(--red)}
  th.sortable.act{color:var(--ink)}
  .hint{font-family:var(--head);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-top:10px;text-align:right}

  /* print / save-as-PDF */
  @media print{
    html,body,.screen{background:#fff !important}
    .screen{padding:0}
    .paper{box-shadow:none;border:none;background:#fff;background-image:none;color:#111;max-width:none;padding:0 8px}
    nav.tabs,.statusbar,.btn,.hint{display:none !important}
    .mast h1,.lead,.sechead h3,.tk,.rk,.cardgrid .v,.statline .v,.hero .tkr{color:#111 !important}
    .sub,.editorial,.co,.cap,.meta,.byline,.thesis{color:#333 !important}
    .rule1,.rule2,.dateline,.statline,table.book thead tr,.hero{border-color:#111 !important}
    .up,.dir,.hero .ptline .p.tgt .v{color:#127a3e !important}
  }

  /* ---- phone support (desktop layout untouched: these only trigger ≤600px) ---- */
  .tscroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  @media(max-width:600px){
    .screen{padding:12px 7px 48px}
    .paper{padding:16px 14px 26px}
    .topline{font-size:9px}
    .mast{padding:8px 0}
    .mast h1{font-size:38px}
    .mast .deco{gap:12px}
    .mast .deco span.line{flex-basis:34px}
    .mast .epi{font-size:11.5px}
    .dateline{font-size:9px;letter-spacing:.08em;gap:6px;padding:7px 0}
    nav.tabs button{padding:11px 11px;font-size:11px;letter-spacing:.1em}
    nav.tabs button.active::after{left:8px;right:8px}
    .statusbar{font-size:9px;gap:7px}
    .statusbar .chips{gap:11px}
    .kicker{font-size:10.5px;margin:16px 0 12px}
    h2.lead{font-size:25px}
    p.sub{font-size:14.5px}
    .byline{font-size:9.5px;letter-spacing:.08em}
    .statline .cell{flex-basis:33.33%;padding:13px 4px;border-bottom:1px solid rgba(233,237,243,.18)}
    .statline .cell:nth-child(3n){border-right:none}
    .statline .v{font-size:27px}
    .hero{padding:18px 16px}
    .hero .tkr{font-size:34px}
    .hero .why{font-size:13.5px}
    .hero .ptline .p .v{font-size:19px}
    .hero .minichips{gap:18px}
    .sechead h3{font-size:24px}
    table.book{min-width:540px}            /* lets .tscroll scroll horizontally on phones */
    table.book td,table.book th{font-size:13px;padding:9px 7px}
    .cardgrid .cell{padding:13px 11px}
    .cardgrid .v{font-size:19px}
    .editorial{font-size:13.5px}
    .editorial .drop::first-letter{font-size:44px}
    .sig{grid-template-columns:96px 1fr 32px}
    footer .a{font-size:11px}
    .hint{text-align:left}
  }
  @media(max-width:380px){
    .mast h1{font-size:31px}
    h2.lead{font-size:22px}
    .statline .v{font-size:23px}
    .hero .tkr{font-size:30px}
  }

  @media(max-width:860px){
    .grid{grid-template-columns:1fr}
    aside.rail{border-left:none;border-top:3px double var(--line);padding-left:0;padding-top:20px;margin-top:8px}
    .mast h1{font-size:50px}.mast .deco span.line{flex-basis:50px}
    h2.lead{font-size:34px}.statline{flex-wrap:wrap}.statline .cell{flex-basis:33%}
  }
</style>
</head>
<body>
<div id="gate"><div class="gatebox">
  <div class="gt">SP</div>
  <div class="gs">Enter password</div>
  <input id="gpw" type="password" inputmode="numeric" autocomplete="off" placeholder="••••" />
  <button id="gbtn">Unlock</button>
  <div id="gerr" class="gerr"></div>
</div></div>
<div class="screen">
  <article class="paper">
    <!-- masthead -->
    <div class="topline">
      <span id="volno">WEEKLY US EQUITIES</span>
      <span id="mast-model">Model —</span>
    </div>

/* AES-256-GCM decrypt of the published snapshot — key = PBKDF2(password). */
async function decryptScan(password){
  const e=window.__ENC__;
  const b=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
  const baseKey=await crypto.subtle.importKey("raw",new TextEncoder().encode(password),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b(e.salt),iterations:e.iter||150000,hash:"SHA-256"},
    baseKey,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b(e.iv)},key,b(e.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}

/* deterministic price-path sparkline: history (solid) projecting to target (dashed) */
function sparkline(cur, tgt, seed){
  cur=+cur||100; tgt=+tgt||cur*1.07;
  let s=7; for(const c of String(seed||"")) s=(s*31+c.charCodeAt(0))%9973;
  const rnd=()=>{s=(s*1103515245+12345)%2147483648; return s/2147483648;};
  const n=40, raw=[]; let p=cur*(0.86+rnd()*0.08);
  for(let i=0;i<n;i++){p*=1+(rnd()-0.47)*0.024; raw.push(p);}
  const scale=cur/raw[n-1]; const hist=raw.map(x=>x*scale);
  const proj=[]; for(let i=1;i<=8;i++) proj.push(cur+(tgt-cur)*(i/8));
  const all=hist.concat(proj), mn=Math.min(...all), mx=Math.max(...all), rg=(mx-mn)||1;
  const W=270,H=52,pd=3, X=i=>pd+i*(W-2*pd)/(all.length-1), Y=v=>pd+(1-(v-mn)/rg)*(H-2*pd);
  const hp=hist.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(" ");
  const pp=[`${X(n-1).toFixed(1)},${Y(hist[n-1]).toFixed(1)}`].concat(proj.map((v,i)=>`${X(n+i).toFixed(1)},${Y(v).toFixed(1)}`)).join(" ");
  return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <polyline points="${hp}" fill="none" stroke="var(--blue)" stroke-width="1.4"></polyline>
    <polyline points="${pp}" fill="none" stroke="var(--up)" stroke-width="1.5" stroke-dasharray="4 3"></polyline>
  </svg>`;
}

async function load(){
  if(ENC){ if(DATA) paint(); return; }   // encrypted snapshot: data set on unlock
  if(STATIC){ DATA=window.__SCAN__; STATUS=window.__STATUS__||null; paint(); return; }
  try{
    const [sc,st]=await Promise.all([
      fetch("/api/scan/latest").then(r=>r.json()),
      fetch("/api/status").then(r=>r.json()).catch(()=>null),
    ]);
    DATA=sc; STATUS=st; paint();
  }catch(e){ $("#content").innerHTML='<div class="loading">Press offline — backend not reachable.</div>'; }
}
async function rescan(){
  const b=$("#refresh"); b.disabled=true; b.textContent="Scanning…";
  try{ await fetch("/api/scan/run",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({universe:"us_market",top:25,max_scan_tickers:600})}); await load(); }
  catch(e){} finally{ b.disabled=false; b.textContent="↻ Re-scan"; }
}

function paint(){
  const d=DATA||{}, m=d.model_metrics||{}, card=d.model_card||{}, sel=d.selected||[];
  const hash=d.model_hash||"—";
  // masthead + status
  $("#mast-model").textContent="Model "+hash;
  $("#foot-model").textContent="Model "+hash;
  $("#sb-model").textContent=hash;
  $("#sb-asof").textContent=d.as_of||"—";
  $("#sb-gen").textContent=ago(d.generated_at);
  $("#sb-dsr").textContent=fmt(m.deflated_sharpe);
  $("#sb-ic").textContent=fmt(m.ic_mean,3);
  $("#sb-warn").style.display=m.overfit_warning?"inline":"none";
  const gd=d.generated_at?new Date(d.generated_at):new Date();
  const dstr=gd.toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
  $("#dateline-date").textContent=dstr;
  $("#src").innerHTML=(d.source==="real-stockpred")?'<span class="dot"></span>Live':'Mock data';

  const tab=document.querySelector("nav.tabs button.active").dataset.tab;
  const C=$("#content");
  if(tab==="book")        C.innerHTML=renderBook(d,m,card,sel);
  else if(tab==="ledger") C.innerHTML=renderLedger(d,sel);
  else if(tab==="model")  C.innerHTML=renderModel(d,m,card);
  else if(tab==="analytics") C.innerHTML=renderAnalytics(d,sel);
}

/* ---------------- THE BOOK ---------------- */
function renderBook(d,m,card,sel){
  const top=sel.slice(0,10);
  const n=top.length;
  const dsr=fmt(m.deflated_sharpe), shp=fmt(m.sharpe_p50), ic=fmt(m.ic_mean,3);
  const lead=top[0]||{};
  const stat=[
    {v:(d.universe_total||0).toLocaleString(),k:"Universe",red:false,feat:false},
    {v:String(n),k:"Long Names",red:false,feat:false},
    {v:dsr,k:"Deflated Sharpe",red:true,feat:true},
    {v:shp,k:"CPCV Sharpe",red:false,feat:false},
    {v:ic,k:"Mean IC",red:false,feat:false},
  ];
  const statHTML=stat.map(s=>`<div class="cell${s.feat?' feat':''}"><div class="v${s.red?' red':''}">${s.v}</div><div class="k">${s.k}</div></div>`).join("");
  const rows=top.map(p=>{

      <td class="l"><span class="tk">${esc(p.ticker)}</span><span class="co">${esc(co)}</span></td>
      <td class="c"><span class="dir">▲</span></td>
      <td><div class="scorebar"><div class="track"><i class="${one?'one':''}" style="width:${Math.round(sc*100)}%"></i></div><span class="val">${fmt(sc,3)}</span></div></td>
      <td>${pct(p.confidence_pct)}</td>
      <td class="up">+${fmt(p.upside_pct,1)}%</td>
      <td style="color:var(--blue)">${fmt(p.probability_7pct_5d,0)}%</td>
    </tr>`;}).join("");
  // rail: why #1 leads
  const sigs=(lead.signals||[]);
  const sigHTML=sigs.length?sigs.map((s,i)=>{
    const w=100-i*22;
    return `<div class="sig"><span class="f">${esc(humanSig(s))}</span><div class="bar"><i style="width:${w}%"></i></div><span class="n">#${i+1}</span></div>`;
  }).join(""):'<div class="cap">No signal attribution available.</div>';
  const folds=card.fold_sharpes||[];
  const ens=card.ensemble_weights||{};
  const ensHTML=Object.entries(ens).map(([k,v])=>`<div class="ens"><span class="k">${esc(k)}</span><span class="v">${Math.round(v*100)}%</span></div>`).join("");
  const lw=(lead.signals||[]).map(humanSig);
  const heroWhy=lw.length?`Tops the book on <b>${esc(lw[0])}</b>${lw[1]?`, <b>${esc(lw[1])}</b>`:""}${lw[2]?` and <b>${esc(lw[2])}</b>`:""}.`:"Leads this week's ranking.";
  const heroHTML=`
    <div class="hero">
      <div>
        <div class="tag">Lead Story · Top Conviction</div>
        <div class="tkr">${esc(lead.ticker||"—")}</div>
        <div class="nm">${esc(lead.company_name&&lead.company_name!==lead.ticker?lead.company_name:"US-listed equity")} · long</div>
        <div class="why">${heroWhy} Modeled at a <b>${fmt(lead.probability_7pct_5d,0)}%</b> chance of clearing +7% before a −3.5% stop in the week ahead.</div>
      </div>
      <div class="nums">
        <div class="ptline">
          <div class="p"><span class="lab">Last</span><span class="v">$${fmt(lead.current_price)}</span></div>
          <span class="arrow">→</span>
          <div class="p tgt"><span class="lab">Target +7%</span><span class="v">$${fmt(lead.target_price)}</span></div>
          <div class="p"><span class="lab">Upside</span><span class="v up">+${fmt(lead.upside_pct,1)}%</span></div>
        </div>
        ${sparkline(lead.current_price,lead.target_price,lead.ticker)}
        <div class="minichips">
          <div><div class="lab">Score</div><div class="v">${fmt(lead.score_raw!=null?lead.score_raw:lead.final_score/100,3)}</div></div>
          <div><div class="lab">Confidence</div><div class="v">${pct(lead.confidence_pct)}</div></div>
          <div><div class="lab">P(+7% / 5d)</div><div class="v">${fmt(lead.probability_7pct_5d,0)}%</div></div>
        </div>
      </div>
    </div>`;
  return `
  <div class="tab active">
    <div class="kicker"><span>Beta</span><span class="l"></span><span class="r">Long-Only · Top ${n}</span></div>
    <div class="byline">As of ${esc(d.as_of||'—')} · Generated ${esc((d.generated_at||'').slice(0,16).replace('T',' '))} UTC</div>
    ${heroHTML}
    <div class="statline">${statHTML}</div>
    <div class="grid">
      <section class="col">
        <div class="sechead"><h3>This Week's Book</h3><span class="meta">Ranked Top ${n} · ${esc(d.as_of||'')}</span></div>
        <div class="tscroll"><table class="book">
          <thead><tr>
            <th class="l" style="width:40px">#</th><th class="l">Ticker</th><th class="c" style="width:42px">Dir</th>
            <th style="width:150px">Score</th><th style="width:62px">Conf</th><th style="width:70px">Upside</th><th style="width:70px">P(+7%)</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table></div>
      </section>
      <aside class="rail">
        <div>
          <div class="fhead">Why ${esc(lead.ticker||'—')} Leads</div>

          <div class="cap">Fig. 2 — ${folds.length} embargoed CPCV folds (real). Bars below the line are losing folds.</div>
        </div>
        <div>
          <div class="fhead thin">Ensemble Weights</div>
          ${ensHTML}
        </div>
      </aside>
    </div>
    <div class="editorial-note">
      <h2 class="lead2">Engine Stakes ${NUMWORD[n]||n} Names As Deflated Sharpe ${m.overfit_warning?'Pushes To':'Holds At'} ${dsr}</h2>
      <p class="sub">Walk-forward validation${m.overfit_warning?` clears the bar but trips the overfit flag — the headline Sharpe runs hot, so size by the information coefficient (IC ${ic}), not the backtest.`:' clears the multiple-testing bar; the weekly book tilts bold, toward raw upside. Judge it by the deflated Sharpe before sizing.'}</p>
    </div>
  </div>`;
}
function topRank(arr,p){return arr.indexOf(p)+1;}

/* fold bar chart with zero baseline (handles negatives) */
function foldChart(folds){
  if(!folds.length) return '<div class="cap">No fold data.</div>';
  const W=240,H=92,base=52,top=8,bot=84;
  const maxAbs=Math.max(...folds.map(Math.abs),0.1);
  const bw=(W-12)/folds.length;
  const bars=folds.map((s,i)=>{
    const x=6+i*bw;
    const len=Math.abs(s)/maxAbs*(s>=0?(base-top):(bot-base));
    const y=s>=0?base-len:base;
    const col=s>=0?'#9fb0c4':'#d24b40';
    return `<rect x="${(x+1).toFixed(1)}" y="${y.toFixed(1)}" width="${(bw-3).toFixed(1)}" height="${Math.max(1,len).toFixed(1)}" fill="${col}"></rect>`;
  }).join("");
  return `<svg viewBox="0 0 ${W} ${H}" style="display:block;width:100%;height:92px">
    <line x1="0" y1="${base}" x2="${W}" y2="${base}" stroke="#e9edf3" stroke-width="1" opacity=".6"></line>${bars}</svg>`;
}

/* ---------------- FULL LEDGER ---------------- */
function renderLedger(d,sel){
  let list=sel.map((p,i)=>({p,rank:i+1}));
  if(LEDGER_SORT.key){
    const k=LEDGER_SORT.key, dr=LEDGER_SORT.dir;
    list=list.slice().sort((a,b)=>{const av=a.p[k]??0,bv=b.p[k]??0;return (av>bv?1:av<bv?-1:0)*dr;});
  }
  const rows=list.map(({p,rank})=>`<tr>
    <td class="l"><span class="rk${rank===1?' one':''}">${rank}</span></td>
    <td class="l"><span class="tk">${esc(p.ticker)}</span>${p.company_name&&p.company_name!==p.ticker?`<span class="co">${esc(p.company_name)}</span>`:''}</td>
    <td>$${fmt(p.current_price)}</td>
    <td>$${fmt(p.target_price)}</td>
    <td class="up">+${fmt(p.upside_pct,1)}%</td>
    <td style="color:var(--blue)">${fmt(p.probability_7pct_5d,0)}%</td>
    <td>${pct(p.confidence_pct)}</td>
    <td class="c"><span class="pill ${p.risk}">${esc(p.risk)}</span></td>
    <td class="l" style="color:var(--muted);font-size:12.5px">${esc((p.signals||[]).map(humanSig).join(" · ")||"—")}</td>
  </tr>`).join("");
  const th=(k,label)=>{const act=LEDGER_SORT.key===k;const ind=act?(LEDGER_SORT.dir<0?'▼':'▲'):'';return `<th class="sortable${act?' act':''}" data-k="${k}">${label}<span class="ind">${ind}</span></th>`;};
  return `
  <div class="tab active">
    <div class="kicker"><span>The Complete Book</span><span class="l"></span><span class="r">All ${sel.length} Names</span></div>
    <h2 class="lead">All Picks</h2>
    <p class="sub">Every name the engine surfaced this week, with entry, +7% target, modeled upside, and the probability of clearing the +7% barrier before a −3.5% stop within five sessions.</p>
    <div class="byline">Long-only · As of ${esc(d.as_of||'—')} · ${sel.length} ranked names</div>
    <div class="tscroll"><table class="book" style="margin-top:18px">
      <thead><tr>
        <th class="l" style="width:40px">#</th><th class="l">Ticker</th>
        ${th("current_price","Price")}${th("target_price","Target")}${th("upside_pct","Upside")}${th("probability_7pct_5d","P(+7%)")}${th("confidence_pct","Conf")}
        <th class="c">Risk</th><th class="l">Leading signals</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
    <div class="hint">Click a column to sort · keys 1–4 switch sections</div>
  </div>`;
}

/* ---------------- THE MODEL ---------------- */
function renderModel(d,m,card){
  const dsr=fmt(m.deflated_sharpe), shp=fmt(m.sharpe_p50), ic=fmt(m.ic_mean,3);
  const fs=card.fold_sharpes||[], fi=card.fold_ics||[], fh=card.fold_hit_rates||[];
  const cells=[
    {k:"Model",v:d.model_hash||"—"},{k:"Objective",v:card.objective||"—"},
    {k:"Features",v:card.n_features||"—"},{k:"Train rows",v:(card.n_rows||0).toLocaleString()},
    {k:"Universe",v:(card.n_tickers||d.universe_total||0).toLocaleString()},{k:"CV folds",v:fs.length||"—"},
  ].map(c=>`<div class="cell"><div class="k">${c.k}</div><div class="v">${esc(c.v)}</div></div>`).join("");
  const foldRows=fs.map((s,i)=>`<tr>
    <td class="l" style="color:var(--muted)">Fold ${i+1}</td>
    <td class="v" style="color:${s>=0?'var(--up)':'var(--red)'}">${fmt(s)}</td>
    <td class="v" style="color:${(fi[i]||0)>=0?'var(--body)':'var(--red)'}">${fi.length?fmt(fi[i],3):'—'}</td>
    <td class="v">${fh.length?pct(fh[i]*100,0):'—'}</td></tr>`).join("");
  const bp=card.best_params||{};
  const bpRows=Object.entries(bp).map(([k,v])=>`<tr><td class="k">${esc(k)}</td><td class="v">${typeof v==='number'?(v%1?fmt(v,4):v):esc(v)}</td></tr>`).join("")
    ||'<tr><td class="k" colspan="2" style="color:var(--muted)">No hyperparameters recorded.</td></tr>';
  const ens=card.ensemble_weights||{};
  const ensRows=Object.entries(ens).map(([k,v])=>`<tr><td class="k">${esc(k)}</td><td class="v">${Math.round(v*100)}%</td></tr>`).join("");
  return `
  <div class="tab active">
    <div class="kicker"><span>Methodology & Validation</span><span class="l"></span><span class="r">The Honest Read</span></div>
    <h2 class="lead">How The Engine Was Judged</h2>
    <div class="cardgrid" style="margin-top:18px">${cells}</div>
    <div class="twocol">
      <div>
        <div class="sechead"><h3>The Verdict</h3></div>
        ${m.overfit_warning?`<div class="warnbox"><div class="t">⚠ Overfit flag raised</div><div class="b">The deflated Sharpe (${dsr}) cleared 0.90 while the information coefficient (${ic}) stayed thin. After a wide Optuna search, the best-looking backtest flatters the model. <b>Trust the IC, not the ${shp} headline Sharpe.</b></div></div>`:''}
        <div class="editorial">
          <p class="drop">The <b>information coefficient</b> — the rank correlation between the model's score and the realised forward return — is the number that survives contact with reality. Here it is <b>${ic}</b>: a real but slim edge, the kind that pays across a basket over many weeks, not on any single name.</p>
          <p>The <b>deflated Sharpe ratio</b> (${dsr}) discounts the headline Sharpe (${shp}) for the number of trials run during tuning — Bailey & López de Prado's correction for the multiple-testing illusion. ${m.overfit_warning?'It is high enough to demand caution.':'It clears the bar comfortably.'}</p>
          <p>Below: the per-fold record across ${fs.length} embargoed walk-forward folds. Dispersion is the point — a model that only works in one regime shows it here.</p>
        </div>
        <div class="fhead thin" style="margin-top:6px">Fold Sharpe — real, embargoed CPCV</div>
        ${foldChart(fs)}
      </div>
      <div>
        <div class="sechead"><h3>Fold-by-Fold</h3></div>
        <table class="kv">
          <tr style="font-family:var(--head);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft)">
            <td class="k">Fold</td><td class="v">Sharpe</td><td class="v">IC</td><td class="v">Hit-rate</td></tr>
          ${foldRows}
        </table>
        <div class="sechead" style="margin-top:26px"><h3>Ensemble</h3></div>
        <table class="kv">${ensRows}</table>
        <div class="sechead" style="margin-top:26px"><h3>Hyperparameters</h3></div>
        <table class="kv">${bpRows}</table>
      </div>
    </div>
  </div>`;
}

/* ---------------- ANALYTICS ---------------- */
function renderAnalytics(d,sel){
  // signal frequency across the whole book
  const freq={};
  sel.forEach(p=>(p.signals||[]).forEach(s=>{freq[s]=(freq[s]||0)+1;}));
  const sigSorted=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,12);
  const maxSig=sigSorted.length?sigSorted[0][1]:1;
  const sigHTML=sigSorted.map(([s,c])=>`<div class="hbar"><span class="l">${esc(humanSig(s))}</span><div class="t"><i style="width:${Math.round(c/maxSig*100)}%"></i></div><span class="v">${c}×</span></div>`).join("");
  // risk breakdown
  const risk={high:0,medium:0,low:0};
  sel.forEach(p=>{risk[p.risk]=(risk[p.risk]||0)+1;});
  const rTot=sel.length||1;
  const riskHTML=["high","medium","low"].map(k=>`<div class="hbar"><span class="l" style="text-transform:capitalize">${k} risk</span><div class="t"><i class="${k==='high'?'red':''}" style="width:${Math.round(risk[k]/rTot*100)}%"></i></div><span class="v">${risk[k]}</span></div>`).join("");
  // upside buckets
  const ups=sel.map(p=>p.upside_pct||0);
  const avgUp=ups.length?ups.reduce((a,b)=>a+b,0)/ups.length:0;
  const probs=sel.map(p=>p.probability_7pct_5d||0);
  const avgProb=probs.length?probs.reduce((a,b)=>a+b,0)/probs.length:0;
  const confs=sel.map(p=>p.confidence_pct||0);
  const avgConf=confs.length?confs.reduce((a,b)=>a+b,0)/confs.length:0;
  const stat=[
    {v:sel.length,k:"Names in book"},{v:"+"+fmt(avgUp,1)+"%",k:"Avg modeled upside"},
    {v:fmt(avgProb,0)+"%",k:"Avg P(+7% / 5d)"},{v:fmt(avgConf,0)+"%",k:"Avg confidence"},
  ].map(s=>`<div class="cell"><div class="v">${s.v}</div><div class="k">${s.k}</div></div>`).join("");
  return `
  <div class="tab active">
    <div class="kicker"><span>Book Analytics</span><span class="l"></span><span class="r">Derived from this week's ${sel.length} names</span></div>
    <h2 class="lead">Reading The Tape</h2>
    <p class="sub">What's actually driving the book this week — which signals recur across names, how risk is distributed, and the aggregate posture of the engine's picks.</p>
    <div class="statline" style="margin-top:16px">${stat}</div>
    <div class="twocol">
      <div>
        <div class="sechead" style="margin-top:6px"><h3>Most-Cited Signals</h3><span class="meta">Across all ${sel.length}</span></div>
        ${sigHTML||'<div class="cap">No signal data.</div>'}
        <div class="cap">How often each feature appears among the leading signals of a pick — the week's dominant themes.</div>
      </div>
      <div>
        <div class="sechead" style="margin-top:6px"><h3>Risk Distribution</h3></div>
        ${riskHTML}
        <div class="cap">Risk is keyed off each name's modeled probability of a big move — higher probability, higher variance.</div>
        <div class="sechead" style="margin-top:26px"><h3>Posture</h3></div>
        <div class="editorial"><p>The book is <b>100% long</b> by mandate — the engine never emits a short. With an average modeled upside of <b>+${fmt(avgUp,1)}%</b> and a <b>${fmt(avgProb,0)}%</b> mean probability of clearing the +7% barrier, this is a concentrated, high-beta tilt. Spread the conviction across the top names; a thin edge is realised in aggregate, not in any single ticker.</p></div>
      </div>
    </div>
  </div>`;
}

// tab switching
$("#tabs").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b)return;
  document.querySelectorAll("nav.tabs button").forEach(x=>x.classList.remove("active"));
  b.classList.add("active"); if(DATA)paint(); window.scrollTo({top:0,behavior:"smooth"});
});
// sortable ledger headers (delegated; #content persists across re-renders)
$("#content").addEventListener("click",e=>{
  const th=e.target.closest("th.sortable"); if(!th)return;
  const k=th.dataset.k;
  if(LEDGER_SORT.key===k) LEDGER_SORT.dir*=-1; else { LEDGER_SORT.key=k; LEDGER_SORT.dir=-1; }
  if(DATA)paint();
});
// keyboard: 1-4 select tabs, arrows step through
document.addEventListener("keydown",e=>{
  if(e.target&&/^(INPUT|TEXTAREA)$/.test(e.target.tagName))return;
  const tabs=[...document.querySelectorAll("nav.tabs button")];
  const cur=tabs.findIndex(b=>b.classList.contains("active"));
  if(e.key>="1"&&e.key<="4"){const i=+e.key-1; if(tabs[i])tabs[i].click();}
  else if(e.key==="ArrowRight"&&cur<tabs.length-1)tabs[cur+1].click();
  else if(e.key==="ArrowLeft"&&cur>0)tabs[cur-1].click();
});
if(ENC){
  const rb=$("#refresh"); if(rb) rb.style.display="none";
  $("#gbtn").addEventListener("click",unlock);
  $("#gpw").addEventListener("keydown",e=>{ if(e.key==="Enter") unlock(); });
  $("#gate").style.display="flex";
  setTimeout(()=>$("#gpw").focus(),60);
}else if(STATIC){
  const rb=$("#refresh"); if(rb) rb.style.display="none";
  load();
}else{
  $("#refresh").addEventListener("click",rescan);
  setInterval(load,5*60*1000);
  load();
}
